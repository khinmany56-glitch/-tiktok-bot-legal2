<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>TikTok Authorization</title>
<style>
  body { font-family: 'Segoe UI', sans-serif; display: flex; align-items: center;
    justify-content: center; min-height: 100vh; margin: 0; background: #0d1117; color: #e6edf3; }
  .box { text-align: center; padding: 40px; background: #161b22;
    border-radius: 12px; border: 1px solid #30363d; max-width: 480px; width: 90%; }
  h2 { color: #3fb950; margin-bottom: 12px; }
  .code-box { background: #0d1117; border: 1px solid #30363d; border-radius: 8px;
    padding: 14px; margin: 16px 0; font-family: monospace; font-size: 15px;
    word-break: break-all; color: #f0883e; }
  .btn { background: #f0883e; color: #000; border: none; padding: 10px 24px;
    border-radius: 6px; font-size: 14px; font-weight: 700; cursor: pointer; margin-top: 8px; }
  .btn:hover { opacity: .85; }
  p { color: #8b949e; font-size: 13px; line-height: 1.7; }
</style>
</head>
<body>
<div class="box">
  <h2>✅ Login สำเร็จ!</h2>
  <p>Copy โค้ดด้านล่างนี้ไปใส่ใน Dashboard<br>แท็บ TikTok Upload → Step 2</p>
  <div class="code-box" id="code-display">กำลังดึงโค้ด...</div>
  <button class="btn" onclick="copyCode()">📋 Copy Code</button>
  <p style="margin-top:16px;font-size:12px">หลัง Copy แล้วปิดหน้านี้ได้เลย</p>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const code   = params.get('code') || 'ไม่พบ code — ลอง Login ใหม่';
  const state  = params.get('state') || '';

  document.getElementById('code-display').textContent = code;

  function copyCode() {
    navigator.clipboard.writeText(code).then(() => {
      const btn = document.querySelector('.btn');
      btn.textContent = '✅ Copied!';
      setTimeout(() => btn.textContent = '📋 Copy Code', 2000);
    });
  }
</script>
</body>
</html>
